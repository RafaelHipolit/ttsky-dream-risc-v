# Tiny Tapeout project information
project:
  title:        "teste_riscv"      # Project title
  author:       "aaa"      # Your name
  discord:      "aa"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "a"      # One line description of what your project does
  language:     "SystemVerilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     100       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_dream_risc_v_top"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_dream_risc_v_top.v"
    - "adbg_config.sv"
    - "apb_bus.sv"
    - "axi_bus.sv"
    - "cluster_clock_gating.sv"
    - "cluster_clock_inverter.sv"
    - "cluster_clock_mux2.sv"
    - "config.sv"
    - "core_top.sv"
    - "debug_bus.sv"
    - "zeroriscy_alu.sv"
    - "zeroriscy_compressed_decoder.sv"
    - "zeroriscy_config.sv"
    - "zeroriscy_controller.sv"
    - "zeroriscy_core.sv"
    - "zeroriscy_cs_registers.sv"
    - "zeroriscy_debug_unit.sv"
    - "zeroriscy_decoder.sv"
    - "zeroriscy_defines.sv"
    - "zeroriscy_ex_block.sv"
    - "zeroriscy_fetch_fifo.sv"
    - "zeroriscy_id_stage.sv"
    - "zeroriscy_if_stage.sv"
    - "zeroriscy_int_controller.sv"
    - "zeroriscy_load_store_unit.sv"
    - "zeroriscy_multdiv_fast.sv"
    - "zeroriscy_multdiv_slow.sv"
    - "zeroriscy_prefetch_buffer.sv"
    - "zeroriscy_register_file_ff.sv"

